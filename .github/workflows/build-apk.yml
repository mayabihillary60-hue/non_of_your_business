name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          python3-pip \
          git \
          openjdk-17-jdk \
          autoconf \
          libtool \
          cmake \
          pkg-config \
          libssl-dev \
          libffi-dev \
          wget \
          unzip \
          zip
    
    - name: Install python-for-android
      run: |
        pip install --upgrade pip
        pip install python-for-android cython virtualenv
    
    
      
    
    - name: Set up Android SDK
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        echo "Android SDK path: $ANDROID_HOME"
        
        # Accept licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Install required components
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" || true
        
        echo "SDK setup complete"
    
    - name: Build APK with p4a
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        export ANDROID_API=34
        
        p4a apk --private . \
          --package=com.yourname.videoeditor \
          --name="Video Editor" \
          --version=0.1 \
          --bootstrap=sdl2 \
          --requirements="python3,kivy==2.2.1,moviepy,numpy,Pillow,android" \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --arch=armeabi-v7a \
          --arch=arm64-v8a \
          --release
          --android_api=34
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: video-editor-apk
        path: '*.apk'