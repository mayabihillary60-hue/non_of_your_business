name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          python3-pip \
          python3-venv \
          git \
          wget \
          unzip \
          zip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          cmake \
          pkg-config \
          libssl-dev \
          libffi-dev
    
    - name: Install python-for-android
      run: |
        pip install python-for-android
    
    - name: Create AndroidManifest.xml
      run: |
        mkdir -p .buildozer/android/platform
        cat > .buildozer/android/platform/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.yourname.videoeditor"
    android:versionCode="1"
    android:versionName="0.1">
    <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="31"/>
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
    <application android:label="Video Editor" android:icon="@mipmap/icon">
        <activity android:name="org.kivy.android.PythonActivity"
            android:launchMode="singleTask"
            android:configChanges="orientation|keyboardHidden|screenSize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF
    
    - name: Build APK with p4a
      run: |
        p4a apk --private . \
          --package=com.yourname.videoeditor \
          --name="Video Editor" \
          --version=0.1 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy,moviepy,numpy,Pillow,android \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --arch=armeabi-v7a \
          --arch=arm64-v8a \
          --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: video-editor-apk
        path: *.apk