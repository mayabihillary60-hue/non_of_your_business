name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          python3-pip \
          git \
          openjdk-17-jdk \
          autoconf \
          libtool \
          cmake \
          pkg-config \
          libssl-dev \
          libffi-dev \
          wget \
          unzip \
          zip
    
    - name: Install python-for-android
      run: |
        pip install --upgrade pip
        pip install python-for-android cython virtualenv
    
    - name: Create test main.py if not exists
      run: |
        mkdir -p src
        if [ ! -f src/main.py ]; then
          cat > src/main.py << 'EOF'
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.core.window import Window

class VideoEditorApp(App):
    def build(self):
        Window.size = (400, 600)
        layout = BoxLayout(orientation='vertical', padding=20, spacing=10)
        
        title = Label(
            text='Video Editor',
            font_size='24sp',
            size_hint_y=0.2,
            color=(0.2, 0.6, 1, 1)
        )
        layout.add_widget(title)
        
        status = Label(
            text='App is ready!',
            font_size='18sp',
            size_hint_y=0.2
        )
        layout.add_widget(status)
        
        btn = Button(
            text='Click Me',
            size_hint_y=0.1,
            background_color=(0.2, 0.6, 1, 1)
        )
        layout.add_widget(btn)
        
        return layout

if __name__ == '__main__':
    VideoEditorApp().run()
EOF
        fi
        
        touch src/__init__.py
    
    - name: Set up Android SDK
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        echo "Android SDK path: $ANDROID_HOME"
        
        # Accept licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Install required components
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" || true
        
        echo "SDK setup complete"
    
    - name: Build APK with p4a
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        
        p4a apk --private . \
          --package=com.yourname.videoeditor \
          --name="Video Editor" \
          --version=0.1 \
          --bootstrap=sdl2 \
          --requirements="python3,kivy==2.2.1,moviepy,numpy,Pillow,android" \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --arch=armeabi-v7a \
          --arch=arm64-v8a \
          --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: video-editor-apk
        path: '*.apk'