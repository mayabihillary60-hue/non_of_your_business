name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
    
    - name: Create main.py
      run: |
        mkdir -p src
        cat > src/main.py << 'EOF'
from kivy.app import App
from kivy.uix.label import Label
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.button import Button
from kivy.core.window import Window

class VideoEditorApp(App):
    def build(self):
        Window.size = (400, 600)
        layout = BoxLayout(orientation='vertical', padding=20, spacing=10)
        
        label = Label(text='Video Editor', font_size='24sp')
        layout.add_widget(label)
        
        btn = Button(text='Test Button', size_hint_y=0.2)
        layout.add_widget(btn)
        
        return layout

if __name__ == '__main__':
    VideoEditorApp().run()
EOF
        touch src/__init__.py
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = Video Editor
package.name = videoeditor
package.domain = com.yourname
source.dir = src
source.include_exts = py,png,jpg,kv,atlas
version = 0.1
requirements = python3,kivy
orientation = portrait
osx.python_version = 3
osx.kivy_version = 2.2.1
fullscreen = 0

[buildozer]
log_level = 2
warn_on_root = 1
EOF
    
    - name: Build APK
      run: |
        # Use the pre-installed Android SDK
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/tools:$PATH
        
        echo "Android SDK found at: $ANDROID_HOME"
        echo "Available platforms:"
        ls $ANDROID_HOME/platforms/ || echo "No platforms found"
        
        # Accept licenses
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        
        # Build
        buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: video-editor-apk
        path: bin/*.apk