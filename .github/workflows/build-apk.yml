name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          python3-pip \
          python3-venv \
          git \
          wget \
          unzip \
          zip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          cmake \
          pkg-config \
          libssl-dev \
          libffi-dev
    
    - name: Install python-for-android
      run: |
        pip install python-for-android
    
    
    
    - name: Build APK with p4a
      run: |
        p4a apk --private . \
          --package=com.yourname.videoeditor \
          --name="Video Editor" \
          --version=0.1 \
          --bootstrap=sdl2 \
          --requirements="python3,kivy,moviepy,numpy,Pillow,android" \
          --permission=READ_EXTERNAL_STORAGE \
          --permission=WRITE_EXTERNAL_STORAGE \
          --arch=armeabi-v7a \
          --arch=arm64-v8a \
          --release
          --sdk_dir=$ANDROID_HOME \
          --ndk_dir=$ANDROID_NDK_HOME \
          --android_api=34 \
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: video-editor-apk
        path: '*.apk'